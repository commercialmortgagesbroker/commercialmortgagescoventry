# Fly.io deployment config for Commercial Mortgages Coventry
# Next.js 16 SSR via Docker (standalone output)
# See https://fly.io/docs/reference/configuration/

app = "commercialmortgagescoventry"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  RESEND_TO = "commercialmortgagesbroker@gmail.com"
  SITE_SOURCE = "Commercial Mortgages Coventry Primary Website"
  SITE_TAG = "CommercialMortgagesCoventry"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
